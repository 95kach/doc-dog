openapi: 3.0.3
info:
  title: Chop-Chop API
  version: 1.0.0
  description: Job processing API for Chop-Chop
servers:
  - url: https://api.chop-chop.dev
paths:
  /jobs:
    get:
      summary: List jobs
      description: Returns a paginated list of all jobs.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          description: Maximum number of results
        - name: offset
          in: query
          schema:
            type: integer
          description: Number of results to skip
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
                  total:
                    type: integer
                    description: Total number of jobs
    post:
      summary: Create a job
      description: Submits a new job for processing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  description: The URL to process
                callback:
                  type: string
                  description: Webhook URL for completion notification
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message
  /jobs/{id}:
    get:
      summary: Get job status
      description: Returns the current status and details of a specific job.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The job ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message
components:
  schemas:
    Job:
      type: object
      properties:
        id:
          type: string
          description: Unique job identifier
        url:
          type: string
          description: The URL being processed
        status:
          type: string
          description: Current job status
        createdAt:
          type: string
          description: When the job was created
